<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manchester House Price Heatmap</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header>
        <h1>Manchester<br>Price Map</h1>
        <p class="subtitle">Resale market · Last 3 years</p>
      </header>

      <section class="control-group">
        <label for="budget-input">Budget</label>
        <div class="budget-row">
          <span class="currency">£</span>
          <input
            type="number"
            id="budget-input"
            min="50000"
            max="2000000"
            step="5000"
            value="300000"
            aria-label="Budget in pounds"
          />
        </div>
        <input
          type="range"
          id="budget-slider"
          min="50000"
          max="1000000"
          step="5000"
          value="300000"
          aria-label="Budget slider"
        />
        <div class="slider-labels">
          <span>£50k</span>
          <span>£1m</span>
        </div>
      </section>

      <section class="control-group">
        <label>Property type</label>
        <div class="type-buttons" role="group" aria-label="Property type">
          <button class="type-btn active" data-type="all">All</button>
          <button class="type-btn" data-type="flat">Flat</button>
          <button class="type-btn" data-type="terraced">Terraced</button>
          <button class="type-btn" data-type="semi">Semi</button>
          <button class="type-btn" data-type="detached">Detached</button>
        </div>
      </section>

      <section class="control-group">
        <div class="legend">
          <div class="legend-item">
            <span class="swatch green"></span>
            <span>Affordable <small>(≤95% of budget)</small></span>
          </div>
          <div class="legend-item">
            <span class="swatch amber"></span>
            <span>Stretch <small>(95–115%)</small></span>
          </div>
          <div class="legend-item">
            <span class="swatch red"></span>
            <span>Over budget <small>(&gt;115%)</small></span>
          </div>
          <div class="legend-item">
            <span class="swatch grey"></span>
            <span>Insufficient data</span>
          </div>
        </div>
      </section>

      <section class="control-group">
        <button id="fit-affordable" class="action-btn">
          Zoom to affordable areas
        </button>
      </section>

      <section class="control-group mortgage-section">
        <label>Mortgage calculator</label>
        <div class="mortgage-row">
          <span>Deposit</span>
          <div class="input-with-prefix">
            <span>£</span>
            <input type="number" id="deposit" min="0" max="1000000" step="5000" value="50000" />
          </div>
        </div>
        <div class="mortgage-row">
          <span>Term (yrs)</span>
          <input type="number" id="term" min="5" max="40" step="1" value="25" />
        </div>
        <div class="mortgage-row">
          <span>Rate (%)</span>
          <input type="number" id="rate" min="0.1" max="15" step="0.1" value="4.5" />
        </div>
        <div class="mortgage-result">
          Max purchase: <strong id="max-purchase">£—</strong><br>
          Monthly payment: <strong id="monthly-payment">£—</strong>
        </div>
        <button id="apply-mortgage" class="action-btn secondary">
          Apply to budget
        </button>
      </section>

      <footer class="sidebar-footer">
        <p>Data: <a href="https://www.gov.uk/government/collections/price-paid-data" target="_blank" rel="noopener">HM Land Registry PPD</a></p>
        <p id="data-date"></p>
      </footer>
    </aside>

    <div id="map-container">
      <div id="map"></div>
      <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <p>Loading map data…</p>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
